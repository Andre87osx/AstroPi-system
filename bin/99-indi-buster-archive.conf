#!/bin/bash
# This file should be placed at: /etc/apt/apt.conf.d/99-indi-buster-archive
# It optimizes APT configuration for building INDI on archived Debian Buster

# Disable validity check for archived repositories
Acquire::Check-Valid-Until "false";

# Allow installation from unsigned/insecure repositories (necessary for archives)
Acquire::AllowInsecureRepositories "true";
Acquire::AllowDowngradeToInsecureRepositories "true";

# Retry settings for network issues
Acquire::Retries "3";
APT::Acquire::Retries "3";

# Use faster mirror selection
Acquire::ForceIPv4 "true";

# Improve dependency resolution
APT::Solver "3.0";

# Reduce memory usage during builds
DPkg::Pre-Install-Pkgs {"/sbin/ethtool -K eth0 gso off; true";};
DPkg::Pre-Install-Pkgs {"/sbin/ethtool -K eth0 tso off; true";};

# Parallel processing
APT::Apt-Get::Build-Dep-Automatically "false";
APT::Build-Profiles "nocheck";
